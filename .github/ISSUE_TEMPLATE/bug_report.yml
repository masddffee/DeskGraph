name: Bug report
description: Report reproducible incorrect behavior using synthetic data only.
title: '[Bug]: '
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Do not include private filenames, paths, file contents, OCR, embeddings, graph data, secrets, or an unpatched vulnerability. Use the private security advisory flow for security reports.
  - type: input
    id: version
    attributes:
      label: DeskGraph version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Apple Silicon
        - macOS Intel
        - Windows x64
        - Linux experimental
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Use generated or non-sensitive fixture data.
      placeholder: Steps, expected behavior, and observed behavior.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed private local data and secrets from this report.
          required: true
