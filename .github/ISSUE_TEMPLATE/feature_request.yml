name: Feature request
description: Propose a user outcome without weakening DeskGraph safety invariants.
title: '[Feature]: '
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem and user outcome
      description: Describe the problem, not only a preferred implementation.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Privacy, scope, and data-safety impact
      description: Explain any filesystem, network, model, MCP, or recovery implications.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Proposed acceptance evidence
      description: List observable behavior, tests, and relevant performance evidence.
    validations:
      required: true
