[workspace]
members = [
  "apps/cli",
  "apps/desktop/src-tauri",
  "crates/domain",
  "crates/telemetry",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.97"
license = "Apache-2.0"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = "2"
tauri-build = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "json"] }

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
panic = "abort"
strip = true
